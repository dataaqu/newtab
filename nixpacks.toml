[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
cmds = [
  "npm run build",
  "cp -r .next/static .next/standalone/.next/static",
  "mkdir -p .next/standalone/public && cp -r public/. .next/standalone/public/ 2>/dev/null || true"
]

[start]
cmd = "node .next/standalone/server.js"
